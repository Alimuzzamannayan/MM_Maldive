<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — Metamorphosis MV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel">
    // Footer reused from app.jsx — declare a small local copy here.
    function Footer() {
      return (
        <footer className="rb-footer">
          <div className="rb-container">
            <div className="rb-footer-grid">
              <div>
                <img src="../assets/logo-full-light.png" alt="Metamorphosis" style={{ height: 38, marginBottom: 22 }} />
                <p style={{ fontSize: 14, lineHeight: 1.65, fontWeight: 300, maxWidth: 280, color: "rgba(255,255,255,0.6)" }}>
                  A Maldives-based multi-service company helping local businesses and expats thrive — from accounting to apps, all under one roof.
                </p>
              </div>
              {[
                ["Services", ["Business Consulting", "App Development", "Accounting & MIRA", "Expat Services", "All Services"]],
                ["Company", ["About Us", "Case Studies", "Blog", "Careers"]],
                ["Legal", ["Privacy Policy", "Terms of Service", "Cookies", "MIRA Disclosure"]],
                ["Contact", ["Malé, Maldives", "marketing@metamorphosis.com.bd", "+960 741 7734", "Get a Quote"]],
              ].map(([h, items]) => (
                <div key={h} className="rb-foot-col">
                  <h4>{h}</h4>
                  <ul>{items.map((x) => <li key={x}><a href="#">{x}</a></li>)}</ul>
                </div>
              ))}
            </div>
            <div className="rb-foot-bottom">
              <div>© 2026 Metamorphosis MV. All rights reserved.</div>
              <div>Built with React.</div>
            </div>
          </div>
        </footer>
      );
    }
    window.Footer = Footer;
  </script>
  <script type="text/babel" src="contact-app.jsx"></script>
</body>
</html>
